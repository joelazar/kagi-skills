[tools]
go = "1.26"
golangci-lint = "latest"
gofumpt = "latest"
goreleaser = "latest"

[env]
VERSION = "{{exec(command='git describe --tags --always --dirty 2>/dev/null || echo dev')}}"
COMMIT = "{{exec(command='git rev-parse --short HEAD 2>/dev/null || echo unknown')}}"
BUILD_DATE = "{{exec(command='date -u +%Y-%m-%dT%H:%M:%SZ')}}"

[tasks.build]
description = "Build the kagi binary with version injection"
run = 'go build -ldflags "-s -w -X github.com/joelazar/kagi/internal/version.Version=$VERSION -X github.com/joelazar/kagi/internal/version.Commit=$COMMIT -X github.com/joelazar/kagi/internal/version.Date=$BUILD_DATE" -o bin/kagi ./cmd/kagi'

[tasks.test]
description = "Run all tests"
run = "go test ./..."

[tasks.test-integration]
description = "Run integration tests"
run = "go test -tags integration ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"

[tasks.fmt]
description = "Format code with gofumpt"
run = "gofumpt -w -l ."

[tasks.clean]
description = "Remove built binaries"
run = "rm -rf bin/"

[tasks.install]
description = "Install the kagi binary"
run = 'go install -ldflags "-s -w -X github.com/joelazar/kagi/internal/version.Version=$VERSION -X github.com/joelazar/kagi/internal/version.Commit=$COMMIT -X github.com/joelazar/kagi/internal/version.Date=$BUILD_DATE" ./cmd/kagi'
